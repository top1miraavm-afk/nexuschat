<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusChat - Мессенджер</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;height:100vh}
        #app{width:100%;height:100vh}
        .screen{display:none;width:100%;height:100%}
        .screen.active{display:flex;justify-content:center;align-items:center}
        
        .auth-card{background:#fff;padding:40px;border-radius:20px;width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
        .auth-card h1{margin-bottom:20px;color:#1e293b}
        .auth-card input{width:100%;padding:15px;margin:10px 0;border:2px solid #e2e8f0;border-radius:10px;font-size:16px;outline:0}
        .auth-card input:focus{border-color:#6366f1}
        
        .btn{width:100%;padding:15px;border:0;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin:10px 0}
        .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
        .btn-secondary{background:transparent;color:#6366f1;border:2px solid #6366f1}
        .error{color:#ef4444;margin-top:10px;min-height:20px;font-size:14px}
        
        .chat-layout{display:flex;width:100%;height:100%;background:#fff}
        .sidebar{width:350px;background:#f1f5f9;border-right:1px solid #e2e8f0;display:flex;flex-direction:column}
        .sidebar-header{padding:20px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
        .users-list{flex:1;overflow-y:auto;padding:10px}
        .user-item{padding:15px;background:#fff;border-radius:10px;margin-bottom:5px;cursor:pointer}
        .user-item:hover,.user-item.active{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
        .logout-btn{background:rgba(255,255,255,.2);color:#fff;border:0;padding:8px 15px;border-radius:8px;cursor:pointer;margin-top:5px}
        
        .chat-area{flex:1;display:flex;flex-direction:column}
        .chat-header{padding:20px;border-bottom:1px solid #e2e8f0;font-weight:600}
        .messages{flex:1;overflow-y:auto;padding:20px;background:#f8fafc}
        .msg{margin:10px 0;display:flex}
        .msg.sent{justify-content:flex-end}
        .msg-bubble{max-width:60%;padding:12px 18px;border-radius:18px;word-wrap:break-word}
        .msg.sent .msg-bubble{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
        .msg.received .msg-bubble{background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.05)}
        
        .input-area{padding:20px;border-top:1px solid #e2e8f0;display:flex;gap:10px}
        .input-area input{flex:1;padding:15px;border:2px solid #e2e8f0;border-radius:25px;outline:0;font-size:15px}
        .btn-send{padding:15px 25px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:0;border-radius:25px;cursor:pointer;font-size:18px}
        
        .admin-link{position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;padding:12px 20px;border-radius:50px;text-decoration:none;font-weight:600;z-index:1000}
    </style>
</head>
<body>
    <div id="app">
        <!-- Логин -->
        <div id="login-screen" class="screen active">
            <div class="auth-card">
                <h1>💬 NexusChat</h1>
                <input type="text" id="login-username" placeholder="Логин">
                <input type="password" id="login-password" placeholder="Пароль">
                <button class="btn btn-primary" onclick="login()">Войти</button>
                <button class="btn btn-secondary" onclick="showScreen('register-screen')">Регистрация</button>
                <div class="error" id="login-error"></div>
            </div>
        </div>

        <!-- Регистрация -->
        <div id="register-screen" class="screen">
            <div class="auth-card">
                <h1>✨ Регистрация</h1>
                <input type="text" id="reg-username" placeholder="Придумайте логин">
                <input type="password" id="reg-password" placeholder="Придумайте пароль">
                <button class="btn btn-primary" onclick="register()">Создать аккаунт</button>
                <button class="btn btn-secondary" onclick="showScreen('login-screen')">Назад</button>
                <div class="error" id="reg-error"></div>
            </div>
        </div>

        <!-- Чат -->
        <div id="chat-screen" class="screen">
            <div class="chat-layout">
                <div class="sidebar">
                    <div class="sidebar-header">
                        <div>👤 <span id="my-username"></span></div>
                        <button class="logout-btn" onclick="logout()">Выйти</button>
                    </div>
                    <div class="users-list" id="users-list"></div>
                </div>
                <div class="chat-area">
                    <div class="chat-header" id="chat-partner">Выберите собеседника</div>
                    <div class="messages" id="messages"></div>
                    <div class="input-area">
                        <input type="text" id="msg-input" placeholder="Сообщение..." disabled>
                        <button class="btn-send" id="send-btn" onclick="sendMsg()" disabled>📤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <a href="admin.html" class="admin-link">👑 Админ</a>

    <script src="js/app.js"></script>
</body>
</html>
